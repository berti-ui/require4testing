<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Testlauf Details – Require4Testing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Require4Testing</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/anforderungen">Anforderungen</a>
            <a class="nav-link" href="/testfaelle">Testfälle</a>
            <a class="nav-link active" href="/testlaeufe">Testläufe</a>
            <a class="nav-link" href="/testdurchfuehrungen">Testdurchführungen</a>
        </div>
    </div>
</nav>
<div class="container">
    <h1 th:text="'Testlauf: ' + ${testlauf.name}">Testlauf</h1>
    <p class="text-muted">Erstellungsdatum: <span th:text="${testlauf.erstellungsdatum}"></span></p>

    <h2 class="mt-4">Zugeordnete Testfälle</h2>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Testfall</th>
                <th>Anforderung</th>
                <th>Tester</th>
                <th>Ergebnis</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="td : ${testlauf.testdurchfuehrungen}">
                <td th:text="${td.testfall.titel}"></td>
                <td th:text="${td.testfall.anforderung != null ? td.testfall.anforderung.titel : '–'}"></td>
                <td th:text="${td.testerName}"></td>
                <td>
                    <span th:text="${td.ergebnis}"
                          th:class="${td.ergebnis.name() == 'BESTANDEN'} ? 'badge bg-success' :
                                    (${td.ergebnis.name() == 'FEHLGESCHLAGEN'} ? 'badge bg-danger' : 'badge bg-secondary')">
                    </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(testlauf.testdurchfuehrungen)}">
                <td colspan="4" class="text-center text-muted">Noch keine Testfälle zugeordnet.</td>
            </tr>
        </tbody>
    </table>

    <h2 class="mt-4">Testfall zuordnen</h2>
    <form th:action="@{/testlaeufe/{id}/zuordnen(id=${testlauf.id})}" method="post" style="max-width:500px">
        <div class="mb-3">
            <label class="form-label fw-bold">Testfall</label>
            <select class="form-select" name="testfallId" required>
                <option value="">– Testfall wählen –</option>
                <option th:each="tf : ${testfaelle}" th:value="${tf.id}"
                        th:text="${tf.titel} + (${tf.anforderung != null} ? ' [' + ${tf.anforderung.titel} + ']' : '')"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Tester</label>
            <input type="text" class="form-control" name="testerName" placeholder="Name des Testers" required/>
        </div>
        <button type="submit" class="btn btn-primary">Zuordnen</button>
        <a href="/testlaeufe" class="btn btn-secondary ms-2">Zurück</a>
    </form>
</div>
</body>
</html>

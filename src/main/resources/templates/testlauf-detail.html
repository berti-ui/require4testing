<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Testlauf Details – Require4Testing</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<h1 th:text="'Testlauf: ' + ${testlauf.name}">Testlauf</h1>
<p>Erstellungsdatum: <span th:text="${testlauf.erstellungsdatum}"></span></p>

<h2>Zugeordnete Testfälle</h2>
<table>
    <thead>
        <tr>
            <th>Testfall</th>
            <th>Anforderung</th>
            <th>Tester</th>
            <th>Ergebnis</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="td : ${testlauf.testdurchfuehrungen}">
            <td th:text="${td.testfall != null ? td.testfall.titel : '–'}"></td>
            <td th:text="${td.testfall != null ? (td.testfall.anforderung != null ? td.testfall.anforderung.titel : '–') : '–'}"></td>
            <td th:text="${td.testerName}"></td>
            <td th:text="${td.ergebnis}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(testlauf.testdurchfuehrungen)}">
            <td colspan="4">Noch keine Testfälle zugeordnet.</td>
        </tr>
    </tbody>
</table>

<h2>Testfall zuordnen</h2>
<form th:action="@{/testlaeufe/{id}/zuordnen(id=${testlauf.id})}" method="post">
    <p>
        <label>Testfall:<br/>
        <select name="testfallId" required>
            <option value="">– Testfall wählen –</option>
            <option th:each="tf : ${testfaelle}" th:value="${tf.id}"
                    th:text="${tf.titel} + (${tf.anforderung != null} ? ' [' + ${tf.anforderung.titel} + ']' : '')"></option>
        </select></label>
    </p>
    <p>
        <label>Tester:<br/>
        <input type="text" name="testerName" placeholder="Name des Testers" required/></label>
    </p>
    <button type="submit">Zuordnen</button>
    <a href="/testlaeufe">Zurück</a>
</form>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Testfälle – Require4Testing</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<h1>Testfälle</h1>
<p><a href="/testfaelle/neu">Neuen Testfall anlegen</a></p>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Titel</th>
            <th>Beschreibung</th>
            <th>Anforderung</th>
            <th>Aktionen</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="t : ${testfaelle}">
            <td th:text="${t.id}"></td>
            <td th:text="${t.titel}"></td>
            <td th:text="${t.beschreibung}"></td>
            <td th:text="${t.anforderung != null ? t.anforderung.titel : '–'}"></td>
            <td>
                <form th:action="@{/testfaelle/{id}/loeschen(id=${t.id})}" method="post" style="display:inline">
                    <button type="submit" onclick="return confirm('Testfall wirklich löschen?')">Löschen</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(testfaelle)}">
            <td colspan="5">Noch keine Testfälle vorhanden.</td>
        </tr>
    </tbody>
</table>
</body>
</html>

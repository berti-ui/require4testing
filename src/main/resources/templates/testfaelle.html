<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Testfälle – Require4Testing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Require4Testing</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/anforderungen">Anforderungen</a>
            <a class="nav-link active" href="/testfaelle">Testfälle</a>
            <a class="nav-link" href="/testlaeufe">Testläufe</a>
            <a class="nav-link" href="/testdurchfuehrungen">Testdurchführungen</a>
        </div>
    </div>
</nav>
<div class="container">
    <h1>Testfälle</h1>
    <a href="/testfaelle/neu" class="btn btn-primary mb-3">+ Neuer Testfall</a>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Titel</th>
                <th>Beschreibung</th>
                <th>Anforderung</th>
                <th>Aktionen</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="t : ${testfaelle}">
                <td th:text="${t.id}"></td>
                <td th:text="${t.titel}"></td>
                <td th:text="${t.beschreibung}"></td>
                <td th:text="${t.anforderung != null ? t.anforderung.titel : '–'}"></td>
                <td>
                    <form th:action="@{/testfaelle/{id}/loeschen(id=${t.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('Testfall wirklich löschen?')">Löschen</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(testfaelle)}">
                <td colspan="5" class="text-center text-muted">Noch keine Testfälle vorhanden.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>

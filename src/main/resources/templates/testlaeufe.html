<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Testläufe – Require4Testing</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<h1>Testläufe</h1>
<p><a href="/testlaeufe/neu">Neuen Testlauf anlegen</a></p>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Erstellungsdatum</th>
            <th>Aktionen</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="t : ${testlaeufe}">
            <td th:text="${t.id}"></td>
            <td th:text="${t.name}"></td>
            <td th:text="${t.erstellungsdatum}"></td>
            <td>
                <a th:href="@{/testlaeufe/{id}(id=${t.id})}">Details / Zuordnen</a>
                <form th:action="@{/testlaeufe/{id}/loeschen(id=${t.id})}" method="post" style="display:inline">
                    <button type="submit" onclick="return confirm('Testlauf wirklich löschen?')">Löschen</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(testlaeufe)}">
            <td colspan="4">Noch keine Testläufe vorhanden.</td>
        </tr>
    </tbody>
</table>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Anforderung – Require4Testing</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<h1 th:text="${anforderung.id == null} ? 'Neue Anforderung' : 'Anforderung bearbeiten'">Anforderung</h1>
<form th:action="${anforderung.id == null} ? @{/anforderungen} : @{/anforderungen/{id}/bearbeiten(id=${anforderung.id})}"
      th:object="${anforderung}" method="post">
    <p>
        <label>Titel:<br/>
        <input type="text" th:field="*{titel}" required/></label>
    </p>
    <p>
        <label>Beschreibung:<br/>
        <textarea th:field="*{beschreibung}" rows="4"></textarea></label>
    </p>
    <button type="submit">Speichern</button>
    <a href="/anforderungen">Abbrechen</a>
</form>
</body>
</html>

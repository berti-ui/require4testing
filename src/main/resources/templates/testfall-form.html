<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Neuer Testfall – Require4Testing</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<h1>Neuer Testfall</h1>
<form th:action="@{/testfaelle}" th:object="${testfall}" method="post">
    <p>
        <label>Titel:<br/>
        <input type="text" th:field="*{titel}" required/></label>
    </p>
    <p>
        <label>Beschreibung:<br/>
        <textarea th:field="*{beschreibung}" rows="4"></textarea></label>
    </p>
    <p>
        <label>Anforderung:<br/>
        <select name="anforderungId">
            <option value="">– Keine Anforderung –</option>
            <option th:each="a : ${anforderungen}" th:value="${a.id}" th:text="${a.titel}"></option>
        </select></label>
    </p>
    <button type="submit">Speichern</button>
    <a href="/testfaelle">Abbrechen</a>
</form>
</body>
</html>

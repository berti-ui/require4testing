<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Neuer Testfall – Require4Testing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Require4Testing</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/anforderungen">Anforderungen</a>
            <a class="nav-link active" href="/testfaelle">Testfälle</a>
            <a class="nav-link" href="/testlaeufe">Testläufe</a>
            <a class="nav-link" href="/testdurchfuehrungen">Testdurchführungen</a>
        </div>
    </div>
</nav>
<div class="container" style="max-width:600px">
    <h1>Neuer Testfall</h1>
    <form th:action="@{/testfaelle}" th:object="${testfall}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">Titel</label>
            <input type="text" class="form-control" th:field="*{titel}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Beschreibung</label>
            <textarea class="form-control" th:field="*{beschreibung}" rows="4"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Anforderung</label>
            <select class="form-select" name="anforderungId">
                <option value="">– Keine Anforderung –</option>
                <option th:each="a : ${anforderungen}" th:value="${a.id}" th:text="${a.titel}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Speichern</button>
        <a href="/testfaelle" class="btn btn-secondary ms-2">Abbrechen</a>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Anforderungen – Require4Testing</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<h1>Anforderungen</h1>
<p><a href="/anforderungen/neu">Neue Anforderung anlegen</a></p>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Titel</th>
            <th>Beschreibung</th>
            <th>Aktionen</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="a : ${anforderungen}">
            <td th:text="${a.id}"></td>
            <td th:text="${a.titel}"></td>
            <td th:text="${a.beschreibung}"></td>
            <td>
                <a th:href="@{/anforderungen/{id}/bearbeiten(id=${a.id})}">Bearbeiten</a>
                <form th:action="@{/anforderungen/{id}/loeschen(id=${a.id})}" method="post" style="display:inline">
                    <button type="submit" onclick="return confirm('Anforderung wirklich löschen?')">Löschen</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(anforderungen)}">
            <td colspan="4">Noch keine Anforderungen vorhanden.</td>
        </tr>
    </tbody>
</table>
</body>
</html>

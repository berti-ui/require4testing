<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Neuer Testlauf – Require4Testing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Require4Testing</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/anforderungen">Anforderungen</a>
            <a class="nav-link" href="/testfaelle">Testfälle</a>
            <a class="nav-link active" href="/testlaeufe">Testläufe</a>
            <a class="nav-link" href="/testdurchfuehrungen">Testdurchführungen</a>
        </div>
    </div>
</nav>
<div class="container" style="max-width:600px">
    <h1>Neuer Testlauf</h1>
    <form th:action="@{/testlaeufe}" th:object="${testlauf}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">Name</label>
            <input type="text" class="form-control" th:field="*{name}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Erstellungsdatum</label>
            <input type="date" class="form-control" th:field="*{erstellungsdatum}"/>
        </div>
        <button type="submit" class="btn btn-primary">Speichern</button>
        <a href="/testlaeufe" class="btn btn-secondary ms-2">Abbrechen</a>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Neuer Testlauf – Require4Testing</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<h1>Neuer Testlauf</h1>
<form th:action="@{/testlaeufe}" th:object="${testlauf}" method="post">
    <p>
        <label>Name:<br/>
        <input type="text" th:field="*{name}" required/></label>
    </p>
    <p>
        <label>Erstellungsdatum:<br/>
        <input type="date" th:field="*{erstellungsdatum}"/></label>
    </p>
    <button type="submit">Speichern</button>
    <a href="/testlaeufe">Abbrechen</a>
</form>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Testdurchführungen – Require4Testing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Require4Testing</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/anforderungen">Anforderungen</a>
            <a class="nav-link" href="/testfaelle">Testfälle</a>
            <a class="nav-link" href="/testlaeufe">Testläufe</a>
            <a class="nav-link active" href="/testdurchfuehrungen">Testdurchführungen</a>
        </div>
    </div>
</nav>
<div class="container">
    <h1>Testdurchführungen</h1>
    <p class="text-muted">Hier können Tester das Ergebnis ihrer zugewiesenen Testfälle erfassen.</p>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Testlauf</th>
                <th>Testfall</th>
                <th>Anforderung</th>
                <th>Tester</th>
                <th>Ergebnis</th>
                <th>Ergebnis setzen</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="td : ${testdurchfuehrungen}">
                <td th:text="${td.testlauf.name}"></td>
                <td th:text="${td.testfall.titel}"></td>
                <td th:text="${td.testfall.anforderung != null ? td.testfall.anforderung.titel : '–'}"></td>
                <td th:text="${td.testerName}"></td>
                <td>
                    <span th:text="${td.ergebnis}"
                          th:class="${td.ergebnis.name() == 'BESTANDEN'} ? 'badge bg-success' :
                                    (${td.ergebnis.name() == 'FEHLGESCHLAGEN'} ? 'badge bg-danger' : 'badge bg-secondary')">
                    </span>
                </td>
                <td>
                    <form th:action="@{/testdurchfuehrungen/{id}/ergebnis(id=${td.id})}" method="post"
                          style="display:flex; gap:6px; align-items:center">
                        <select class="form-select form-select-sm" name="ergebnis" style="width:auto">
                            <option th:each="e : ${ergebnisse}"
                                    th:value="${e}"
                                    th:text="${e}"
                                    th:selected="${td.ergebnis == e}"></option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-primary">OK</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(testdurchfuehrungen)}">
                <td colspan="6" class="text-center text-muted">Keine Testdurchführungen vorhanden.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>

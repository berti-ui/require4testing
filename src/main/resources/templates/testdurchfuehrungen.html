<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Testdurchführungen – Require4Testing</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<h1>Testdurchführungen</h1>
<p>Hier können Tester das Ergebnis ihrer zugewiesenen Testfälle erfassen.</p>
<table>
    <thead>
        <tr>
            <th>Testlauf</th>
            <th>Testfall</th>
            <th>Anforderung</th>
            <th>Tester</th>
            <th>Ergebnis</th>
            <th>Ergebnis setzen</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="td : ${testdurchfuehrungen}">
            <td th:text="${td.testlauf != null ? td.testlauf.name : '–'}"></td>
            <td th:text="${td.testfall != null ? td.testfall.titel : '–'}"></td>
            <td th:text="${td.testfall != null ? (td.testfall.anforderung != null ? td.testfall.anforderung.titel : '–') : '–'}"></td>
            <td th:text="${td.testerName}"></td>
            <td th:text="${td.ergebnis}"></td>
            <td>
                <form th:action="@{/testdurchfuehrungen/{id}/ergebnis(id=${td.id})}" method="post" style="display:flex; gap:4px">
                    <select name="ergebnis">
                        <option th:each="e : ${ergebnisse}"
                                th:value="${e}"
                                th:text="${e}"
                                th:selected="${td.ergebnis == e}"></option>
                    </select>
                    <button type="submit">OK</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(testdurchfuehrungen)}">
            <td colspan="6">Keine Testdurchführungen vorhanden.</td>
        </tr>
    </tbody>
</table>
</body>
</html>
